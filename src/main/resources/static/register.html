<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register - SkillNavigator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand">
            <h2>Skill<span>Navigator</span></h2>
            <p>Placement Readiness</p>
        </div>
        <ul class="sidebar-menu">
            <li onclick="window.location='index.html'"><span class="icon">🏠</span><span>Home</span></li>
            <li class="active"><span class="icon">👤</span><span>Register</span></li>
            <li onclick="window.location='login.html'"><span class="icon">🔑</span><span>Login</span></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="top-header">
            <h1>Create Account</h1>
            <div class="user-info">
                <span>Guest</span>
                <div class="avatar">👤</div>
            </div>
        </div>

        <div class="card" style="max-width:550px; margin:0 auto;">
            <h2>📝 Student Registration</h2>
            <form onsubmit="register(); return false;">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>

                <label>Email Address</label>
                <input type="email" id="email" placeholder="your@email.com" required>

                <label>College</label>
                <input type="text" id="college" placeholder="Your college name" required>

                <label>Branch</label>
                <input type="text" id="branch" placeholder="e.g., Computer Science" required>

                <label>Year</label>
                <input type="number" id="year" placeholder="e.g., 4" min="1" max="4" required>

                <label>Password</label>
                <input type="password" id="password" placeholder="Create a password" required>

                <button type="submit" style="width:100%; margin-top:10px;">Register →</button>
            </form>
        </div>
    </div>

    <script>
        function register() {
            const data = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                college: document.getElementById("college").value,
                branch: document.getElementById("branch").value,
                year: parseInt(document.getElementById("year").value),
                password: document.getElementById("password").value
            };

            fetch("/users/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                alert("✅ Registration Successful! Please login.");
                window.location = "login.html";
            })
            .catch(err => alert("❌ Registration failed: " + err));
        }
    </script>
</body>
</html>
